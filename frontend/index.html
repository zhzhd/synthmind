<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynthMind</title>
    <script>
      (function() {
        var validThemes = ["dark","light","oled","sepia"];
        var validFonts = ["inter","system","serif","mono","pingfang","rounded","emoji"];

        var theme = localStorage.getItem("synthmind_theme");
        if (!theme || validThemes.indexOf(theme) === -1) {
          theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", theme);

        var font = localStorage.getItem("synthmind_font");
        if (!font || validFonts.indexOf(font) === -1) font = "inter";
        document.documentElement.setAttribute("data-font", font);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
